workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build - Ghost Peek
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      groups:
        - ios_credentials # Configure in Codemagic UI with your .p12 and .mobileprovision
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
        # These will be set by Codemagic when you upload credentials
        # CM_CERTIFICATE: from ios_credentials group
        # CM_PROVISIONING_PROFILE: from ios_credentials group
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
    
    scripts:
      # Install dependencies
      - name: Install dependencies
        script: |
          npm install
      
      # Build web app (creates dist folder)
      - name: Build web app
        script: |
          npm run build
      
      # Add and sync iOS platform
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      # Update iOS project Bundle ID
      - name: Update Bundle ID
        script: |
          cd ios/App
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" App/Info.plist
          # Update project.pbxproj
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = io.ionic.starter;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
      
      # Install CocoaPods dependencies
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      # Set up keychain and certificates
      - name: Set up code signing
        script: |
          # Initialize keychain
          keychain initialize
          
          # If using App Store Connect API (recommended)
          # This fetches signing files automatically
          if [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_ADHOC \
              --create
          fi
          
          # Add certificates to keychain
          keychain add-certificates
          
          # Apply profiles to Xcode project
          xcode-project use-profiles --project ios/App/App.xcodeproj
      
      # Build iOS app
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true

  # Alternative workflow using manual .p12 and .mobileprovision files
  ios-manual-signing:
    name: iOS Manual Signing Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Update Bundle ID in Xcode project
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" App/Info.plist
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = io.ionic.starter;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
      
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      
      - name: Set up manual code signing
        script: |
          # Initialize keychain
          keychain initialize
          
          # Add your .p12 certificate
          # The CM_CERTIFICATE and CM_CERTIFICATE_PASSWORD are set in Codemagic UI
          keychain add-certificates
          
          # Install provisioning profile
          # CM_PROVISIONING_PROFILE is set in Codemagic UI
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Find and copy provisioning profile
          PROFILE_PATH=$(find "$CM_BUILD_DIR" -name "*.mobileprovision" -type f | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
            cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          fi
          
          # Use profiles in Xcode project
          xcode-project use-profiles --project ios/App/App.xcodeproj
      
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true

  # Simulator build (no signing required)
  ios-simulator-build:
    name: iOS Simulator Build (No Signing)
    max_build_duration: 45
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      
      - name: Build for Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build
    
    artifacts:
      - ios/App/build/**/*.app
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true
