workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build - Ghost Peek
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      groups:
        - ios_credentials # Configure in Codemagic UI
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
    
    scripts:
      # Instalar dependencias na raiz
      - name: Install dependencies
        script: |
          npm install
      
      # Build do projeto (cria pasta dist)
      - name: Build web app
        script: |
          npm run build
      
      # Adicionar e sincronizar iOS
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      # Instalar CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      # Configurar code signing
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_ADHOC
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj
      
      # Build do projeto iOS
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release \
            --archive-flags="-destination 'generic/platform=iOS'"
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true

  # Workflow alternativo para build sem code signing
  ios-simulator-build:
    name: iOS Simulator Build (No Signing)
    max_build_duration: 45
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
    
    scripts:
      - name: Install dependencies
        script: |
          npm install
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      - name: Build for Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath build \
            build
    
    artifacts:
      - ios/App/build/**/*.app
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true
