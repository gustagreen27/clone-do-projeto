workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build - Ghost Peek
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
        TEAM_ID: "3P88EQ69T9"
        PROVISIONING_PROFILE_NAME: "Hotmart"
        CODE_SIGN_IDENTITY: "iPhone Distribution"
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
    
    scripts:
      # Install dependencies
      - name: Install dependencies
        script: |
          npm install
      
      # Build web app (creates dist folder)
      - name: Build web app
        script: |
          npm run build
      
      # Add and sync iOS platform
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      # Force Manual Code Signing in Xcode Project
      - name: Configure Manual Code Signing
        script: |
          cd ios/App
          
          echo "=== Forcing Manual Code Signing ==="
          
          # Path to project.pbxproj
          PBXPROJ="App.xcodeproj/project.pbxproj"
          
          # Replace ALL occurrences of automatic signing with manual
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          
          # Replace default Bundle ID with our Bundle ID
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = io\.ionic\.starter;/PRODUCT_BUNDLE_IDENTIFIER = '"$BUNDLE_ID"';/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = "io.ionic.starter";/PRODUCT_BUNDLE_IDENTIFIER = "'"$BUNDLE_ID"'";/g' "$PBXPROJ"
          
          # Set Development Team
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = '"$TEAM_ID"';/g' "$PBXPROJ"
          
          # Add PROVISIONING_PROFILE_SPECIFIER if not present
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "'"$PROVISIONING_PROFILE_NAME"'";/g' "$PBXPROJ"
          
          # Set CODE_SIGN_IDENTITY
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "'"$CODE_SIGN_IDENTITY"'";/g' "$PBXPROJ"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = ".*";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "'"$CODE_SIGN_IDENTITY"'";/g' "$PBXPROJ"
          
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" App/Info.plist 2>/dev/null || true
          
          echo "=== Code Signing Configuration Complete ==="
          echo "Bundle ID: $BUNDLE_ID"
          echo "Team ID: $TEAM_ID"
          echo "Provisioning Profile: $PROVISIONING_PROFILE_NAME"
          echo "Code Sign Identity: $CODE_SIGN_IDENTITY"
      
      # Install CocoaPods dependencies
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      # Set up keychain and apply code signing
      - name: Set up code signing
        script: |
          # Initialize keychain for code signing
          keychain initialize
          
          # Add certificates from Codemagic UI configuration
          keychain add-certificates
          
          # Apply provisioning profiles to the Xcode project
          xcode-project use-profiles --project ios/App/App.xcodeproj
      
      # Build iOS app with explicit signing settings
      - name: Build iOS app
        script: |
          cd ios/App
          
          # Get the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
            echo "Using Provisioning Profile UUID: $PROFILE_UUID"
          fi
          
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            COMPILER_INDEX_STORE_ENABLE=NO
      
      # Export IPA
      - name: Export IPA
        script: |
          cd ios/App
          
          # Create ExportOptions.plist for ad-hoc distribution
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PROVISIONING_PROFILE_NAME</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true

  # Simulator build (no signing required) - for testing
  ios-simulator-build:
    name: iOS Simulator Build (No Signing)
    max_build_duration: 45
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      
      - name: Build for Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build
    
    artifacts:
      - ios/App/build/**/*.app
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true
