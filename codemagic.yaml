workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build - Ghost Peek
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    # iOS Code Signing configured in Codemagic UI
    # Certificate: iPhone Distribution: Hui Yang (3P88EQ69T9)
    # Provisioning Profile: Hotmart (ad_hoc)
    
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/Pods
    
    scripts:
      # Install dependencies
      - name: Install dependencies
        script: |
          npm install
      
      # Build web app (creates dist folder)
      - name: Build web app
        script: |
          npm run build
      
      # Add and sync iOS platform
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      # Update iOS project Bundle ID
      - name: Update Bundle ID
        script: |
          cd ios/App
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" App/Info.plist || true
          # Update project.pbxproj - replace default bundle ID
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = io.ionic.starter;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = \"io.ionic.starter\";/PRODUCT_BUNDLE_IDENTIFIER = \"$BUNDLE_ID\";/g" App.xcodeproj/project.pbxproj
      
      # Install CocoaPods dependencies
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      # Set up keychain and apply code signing
      - name: Set up code signing
        script: |
          # Initialize keychain for code signing
          keychain initialize
          
          # Add certificates from Codemagic UI configuration
          keychain add-certificates
          
          # Apply provisioning profiles to the Xcode project
          # This uses the profiles configured in Codemagic UI
          xcode-project use-profiles --project ios/App/App.xcodeproj
      
      # Build iOS app
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release \
            --archive-flags="-destination 'generic/platform=iOS'"
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true

  # Simulator build (no signing required) - for testing
  ios-simulator-build:
    name: iOS Simulator Build (No Signing)
    max_build_duration: 45
    instance_type: mac_mini_m2
    
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        BUNDLE_ID: "app.plantain7502.soybean5714"
        APP_NAME: "Ghost Peek"
    
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Build web app
        script: npm run build
      
      - name: Add and sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      
      - name: Build for Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build
    
    artifacts:
      - ios/App/build/**/*.app
    
    publishing:
      email:
        recipients:
          - gustagreen27@gmail.com
        notify:
          success: true
          failure: true
